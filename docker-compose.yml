services:
  postgres:
    image: postgres:16-alpine
    container_name: pinkdrive-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: pinkdrive
      POSTGRES_USER: pinkdrive_user
      POSTGRES_PASSWORD: pinkdrive_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
